<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar GA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <script
        src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
        crossorigin="anonymous">
    </script>
    <script>
        $(function(){
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>
</head>
<body>
    <div id="body">
        <header id="header"></header>
        <main>
            <h1 class="secname">Eliminar</h1>

            <!-- Search bar -->
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="🔍 Buscar palabra..." oninput="filtrarTabla()" />
            </div>

            <p id="statusMsg"></p>

            <!-- Table -->
            <div class="table-wrapper">
                <table class="maintable">
                    <thead>
                        <tr>
                            <th>Palabra</th>
                            <th>Etimología</th>
                            <th>Función Sintáctica</th>
                            <th>Definición</th>
                            <th>Sinónimos</th>
                            <th>Antónimos</th>
                            <th>Ejemplos</th>
                            <th>Fuentes</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <!-- Confirm delete modal -->
            <div id="confirmModal" class="modal-overlay" style="display:none;">
                <div class="modal-box">
                    <p class="modal-msg">¿Estás seguro de que quieres eliminar <b id="modalPalabra"></b>?</p>
                    <p class="modal-sub">Esta acción no se puede deshacer.</p>
                    <div class="modal-btns">
                        <button id="cancelModalBtn" onclick="cerrarModal()">Cancelar</button>
                        <button id="confirmModalBtn" onclick="confirmarEliminar()">Eliminar</button>
                    </div>
                </div>
            </div>

        </main>
        <footer id="footer"></footer>
    </div>

    <script>

        let pendingRowIndex = null;

        // ── On load ───────────────────────────────────────────────────────────
        window.onload = function () {
            fadevisibility();
            cargarPalabras();
        }

        function fadevisibility() {
            document.getElementById("body").style.opacity = 0;
            setTimeout(function () {
                document.getElementById("body").style.transition = "opacity 1.5s";
                document.getElementById("body").style.opacity = 1;
            }, 100);
        }

        // ── Fetch all words ───────────────────────────────────────────────────
        function cargarPalabras() {
            const url = localStorage.getItem("glosarray_url");
            if (!url) {
                showStatus("⚠️ No hay URL guardado. Regresa a Inicio y guarda el URL del Web App.", "red");
                return;
            }

            showStatus("⏳ Cargando glosario...", "white");

            fetch(url + "?action=ver")
                .then(res => res.json())
                .then(data => {
                    if (data.error) { showStatus("❌ Error: " + data.error, "red"); return; }
                    if (data.data.length === 0) { showStatus("📭 El glosario está vacío.", "white"); return; }
                    renderTabla(data.data);
                    showStatus("", "");
                })
                .catch(err => showStatus("❌ Error de conexión: " + err, "red"));
        }

        // ── Render table ──────────────────────────────────────────────────────
        function renderTabla(palabras) {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            palabras.forEach(function (p, i) {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td class="td-palabra">${escapeHtml(p.palabra)}</td>
                    <td>${escapeHtml(p.etimologia)}</td>
                    <td>${escapeHtml(p.funcionSintactica)}</td>
                    <td>${formatLista(p.definicion)}</td>
                    <td>${formatLista(p.sinonimos)}</td>
                    <td>${formatLista(p.antonimos)}</td>
                    <td>${formatLista(p.ejemplos)}</td>
                    <td>${formatLista(p.fuentes)}</td>
                    <td><button class="deleteBtn" onclick="abrirModal(${p.rowIndex}, '${escapeHtml(p.palabra)}')">🗑️ Eliminar</button></td>
                `;
                tr.style.opacity = 0;
                tr.style.transition = "opacity 0.4s ease";
                tbody.appendChild(tr);
                setTimeout(() => tr.style.opacity = 1, 50 * (i + 1));
            });
        }

        // ── Modal ─────────────────────────────────────────────────────────────
        function abrirModal(rowIndex, palabra) {
            pendingRowIndex = rowIndex;
            document.getElementById("modalPalabra").textContent = palabra;
            document.getElementById("confirmModal").style.display = "flex";
        }

        function cerrarModal() {
            pendingRowIndex = null;
            document.getElementById("confirmModal").style.display = "none";
        }

        function confirmarEliminar() {
            const url = localStorage.getItem("glosarray_url");
            if (!url) { alert("No hay URL guardado."); return; }

            const btn = document.getElementById("confirmModalBtn");
            btn.textContent = "Eliminando...";
            btn.disabled    = true;

            fetch(url, {
                method:  "POST",
                headers: { "Content-Type": "text/plain" },
                body:    JSON.stringify({ action: "eliminar", rowIndex: pendingRowIndex }),
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    cerrarModal();
                    alert("✅ Palabra eliminada exitosamente.");
                    location.reload();
                } else {
                    alert("❌ Error: " + (data.error || "Algo salió mal."));
                    btn.textContent = "Eliminar";
                    btn.disabled    = false;
                }
            })
            .catch(err => {
                alert("❌ Error de conexión: " + err);
                btn.textContent = "Eliminar";
                btn.disabled    = false;
            });
        }

        // ── Search filter ─────────────────────────────────────────────────────
        function filtrarTabla() {
            const query = document.getElementById("searchBar").value.trim().toLowerCase();
            document.querySelectorAll("#tableBody tr").forEach(tr => {
                const palabra = tr.querySelector(".td-palabra");
                if (!palabra) return;
                tr.style.display = palabra.textContent.toLowerCase().includes(query) ? "" : "none";
            });
        }

        // ── Helpers ───────────────────────────────────────────────────────────
        function formatLista(text) {
            if (!text || text.trim() === "") return "—";
            const items = text.split(/\s{2,}(?=\d+\.)/);
            if (items.length <= 1) return escapeHtml(text);
            const listItems = items
                .map(i => i.trim()).filter(i => i !== "")
                .map(i => `<li>${escapeHtml(i.replace(/^\d+\.\s*/, ""))}</li>`)
                .join("");
            return `<ol class="cell-list">${listItems}</ol>`;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function showStatus(msg, color) {
            const el = document.getElementById("statusMsg");
            el.textContent = msg;
            el.style.color = color;
        }

    </script>
</body>
</html>

<style>

    margin: 0;
    padding: 0;
    box-sizing: border-box;
    background-color: transparent;
}

main {
    padding-bottom: 60px;
}

    padding: 0;
    box-sizing: border-box;
    background-image: linear-gradient(to bottom right, rgb(0, 64, 255), rgb(0, 255, 234), rgb(47, 255, 245));
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: minmax(0, 1fr);
}

.secname {
    color: rgb(255, 255, 255);
    font-size: 30px;
    font-family: "Orbitron", sans-serif;
    text-align: center;
    margin-bottom: 20px;
    margin-top: 20px;
    background-color: rgba(0, 0, 0, 0.294);
    box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.339);
    padding: 10px;
}

/* ── Search bar ── */
.search-wrapper {
    width: 95%;
    margin: 10px auto 20px auto;
    text-align: center;
}

#searchBar {
    font-family: "Orbitron", sans-serif;
    font-size: 22px;
    width: 50%;
    padding: 10px 20px;
    border-radius: 3em;
    border: none;
    box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.2);
    transition: all 0.25s ease-in-out;
    background-color: rgba(255, 255, 255, 0.95);
}

#searchBar:focus {
    font-size: 24px;
    outline: none;
    box-shadow: 0px 0px 30px rgba(255, 255, 255, 0.6);
}

#statusMsg {
    font-family: "Orbitron", sans-serif;
    font-size: 22px;
    text-align: center;
    margin: 20px auto;
    min-height: 30px;
}

/* ── Table ── */
.table-wrapper {
    width: 95%;
    margin: 0 auto 40px auto;
    overflow-x: auto;
}

.maintable {
    width: 100%;
    border-collapse: collapse;
    background-color: rgba(0, 0, 0, 0.294);
    border-radius: 1em;
    box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.455);
    overflow: hidden;
}

.maintable th {
    padding: 12px 10px;
    text-align: center;
    font-family: "Orbitron", sans-serif;
    font-weight: bold;
    color: rgb(255, 255, 255);
    font-size: 22px;
    border-bottom: 2px solid rgba(255, 255, 255, 0.637);
    background-color: rgba(0, 0, 0, 0.2);
}

.maintable td {
    padding: 10px 12px;
    text-align: left;
    color: rgb(255, 255, 255);
    font-size: 18px;
    border-bottom: 2px solid rgba(255, 255, 255, 0.3);
    border-left: 2px solid rgba(255, 255, 255, 0.3);
    vertical-align: top;
}

.maintable td:first-child { border-left: none; }

.maintable tbody tr:hover {
    background-color: rgba(255, 80, 80, 0.1);
    transition: background-color 0.2s ease;
}

.td-palabra {
    font-family: "Orbitron", sans-serif;
    font-size: 20px !important;
    font-weight: bold;
    white-space: nowrap;
}

.cell-list {
    margin: 0;
    padding-left: 20px;
    list-style-type: decimal;
}

.cell-list li {
    margin-bottom: 4px;
    line-height: 1.4;
}

/* ── Delete button ── */
.deleteBtn {
    font-family: "Orbitron", sans-serif;
    font-size: 16px;
    padding: 8px 16px;
    border-radius: 2em;
    border: none;
    background-color: white;
    cursor: pointer;
    box-shadow: 0px 4px 0px rgb(203, 203, 203);
    transition: all 0.2s ease;
    white-space: nowrap;
}

.deleteBtn:hover {
    background-color: rgb(255, 80, 80);
    color: white;
    box-shadow: 0px 4px 0px rgb(180, 40, 40), 0px 4px 15px rgba(255,0,0,0.3);
}

.deleteBtn:active {
    transform: translateY(3px);
    box-shadow: 0px 1px 0px rgb(180, 40, 40);
}

/* ── Confirm modal ── */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: fadeInModal 0.2s ease;
}

@keyframes fadeInModal {
    from { opacity: 0; }
    to   { opacity: 1; }
}

.modal-box {
    background: white;
    border-radius: 2em;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0px 0px 60px rgba(0,0,0,0.5);
    max-width: 500px;
    width: 90%;
    animation: slideUpModal 0.25s ease;
}

@keyframes slideUpModal {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}

.modal-msg {
    font-family: "Orbitron", sans-serif;
    font-size: 22px;
    color: black;
    margin-bottom: 10px;
}

.modal-sub {
    font-family: "Orbitron", sans-serif;
    font-size: 16px;
    color: rgb(150, 0, 0);
    margin-bottom: 30px;
}

.modal-btns {
    display: flex;
    justify-content: center;
    gap: 20px;
}

#cancelModalBtn, #confirmModalBtn {
    font-family: "Orbitron", sans-serif;
    font-size: 22px;
    padding: 12px 30px;
    border-radius: 3em;
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
}

#cancelModalBtn {
    background-color: rgb(230, 230, 230);
    box-shadow: 0px 4px 0px rgb(180,180,180);
}

#cancelModalBtn:hover {
    background-color: rgb(210, 210, 210);
}

#cancelModalBtn:active {
    transform: translateY(3px);
    box-shadow: 0px 1px 0px rgb(180,180,180);
}

#confirmModalBtn {
    background-color: rgb(255, 80, 80);
    color: white;
    box-shadow: 0px 4px 0px rgb(180, 40, 40);
}

#confirmModalBtn:hover {
    background-color: rgb(220, 50, 50);
    box-shadow: 0px 4px 0px rgb(180,40,40), 0px 4px 20px rgba(255,0,0,0.4);
}

#confirmModalBtn:active {
    transform: translateY(3px);
    box-shadow: 0px 1px 0px rgb(180,40,40);
}
</style>
