<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <script
    src="https://code.jquery.com/jquery-3.3.1.js"
    integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60="
    crossorigin="anonymous">
</script>
<script> 
$(function(){
  $("#header").load("header.html"); 
  $("#footer").load("footer.html"); 
});
</script>
<script>
    window.onload = fadevisibility;
    function fadevisibility(){
        document.getElementsByClassName("wholething")[0].style.opacity = 0;
        setTimeout(function(){
            document.getElementsByClassName("wholething")[0].style.transition = "opacity 1.5s";
            document.getElementsByClassName("wholething")[0].style.opacity = 1;
        }, 100);
    }
</script> 
</head>
<body>
    <div id="body">
        <header id="header"></header>
        <main>
            <h1 class="secname">Agregar</h1>
            <div class="wholething">

                <p class="insectionname">Palabra</p>
                <textarea name="palabra" class="word" placeholder="P. ej. Iniciar"></textarea>

                <div class="bodydiv">
                    <div class="divleft">
                        <p class="insectionname">Etimología</p>
                        <textarea name="etimologia" class="insert" placeholder="P. ej. Latín initiāre (empezar)."></textarea>

                        <p class="insectionname">Func. Sintáctica</p>
                        <textarea name="funcion_sintactica" class="insert" placeholder="P. ej. Verbo transitivo"></textarea>

                        <p class="insectionname">Definición</p>
                        <div class="dynamic-group" id="group-definicion"></div>

                        <p class="insectionname">Sinónimos</p>
                        <div class="dynamic-group" id="group-sinonimos"></div>
                    </div>

                    <div class="divright">
                        <p class="insectionname">Antónimos</p>
                        <div class="dynamic-group" id="group-antonimos"></div>

                        <p class="insectionname">Ejemplos</p>
                        <div class="dynamic-group" id="group-ejemplos"></div>

                        <p class="insectionname">Fuentes</p>
                        <div class="dynamic-group" id="group-fuentes"></div>
                    </div>
                </div>

                <button id="agregarform" onclick="submitForm()">Agregar</button>
            </div> 
        </main>
        <footer id="footer"></footer>
    </div> 

<script>
    // ── Dynamic group config ──────────────────────────────────────────────────
    const dynamicGroups = [
        { id: "group-definicion",  placeholder: "P. ej. Comenzar." },
        { id: "group-sinonimos",   placeholder: "P. ej. Comenzar." },
        { id: "group-antonimos",   placeholder: "P. ej. Terminar." },
        { id: "group-ejemplos",    placeholder: "P. ej. Iniciar la sesión." },
        { id: "group-fuentes",     placeholder: "P. ej. Diccionario de la Lengua Española (DLE)." },
    ];

    // ── Initialize all dynamic groups ─────────────────────────────────────────
    dynamicGroups.forEach(group => {
        addTextarea(group.id, group.placeholder);
    });

    // ── Add a new textarea to a group ─────────────────────────────────────────
    function addTextarea(groupId, placeholder) {
        const group = document.getElementById(groupId);
        const index = group.querySelectorAll("textarea").length + 1;

        const wrapper = document.createElement("div");
        wrapper.className = "dynamic-wrapper";

        const number = document.createElement("span");
        number.className = "dynamic-number";
        number.textContent = index + ".";

        const ta = document.createElement("textarea");
        ta.className = "insert dynamic-ta";
        ta.placeholder = index === 1 ? placeholder : "Agregar otro...";

        // When user types → maybe add new textarea
        ta.addEventListener("input", function () {
            handleInput(groupId, placeholder);
        });

        // When user clears → maybe remove this textarea
        ta.addEventListener("blur", function () {
            handleBlur(groupId, placeholder);
        });

        wrapper.appendChild(number);
        wrapper.appendChild(ta);
        group.appendChild(wrapper);
    }

    // ── Handle typing in any textarea of a group ──────────────────────────────
    function handleInput(groupId, placeholder) {
        const group     = document.getElementById(groupId);
        const textareas = group.querySelectorAll("textarea");
        const last      = textareas[textareas.length - 1];

        // If the last textarea has text, add a new empty one
        if (last.value.trim() !== "") {
            addTextarea(groupId, placeholder);
        }

        renumberGroup(groupId);
    }

    // ── Handle blur (user leaves a textarea) ──────────────────────────────────
    function handleBlur(groupId, placeholder) {
        const group    = document.getElementById(groupId);
        const wrappers = group.querySelectorAll(".dynamic-wrapper");

        // Remove any empty textareas that are NOT the last one
        wrappers.forEach((wrapper, i) => {
            const ta = wrapper.querySelector("textarea");
            const isLast = i === wrappers.length - 1;
            if (ta.value.trim() === "" && !isLast) {
                wrapper.remove();
            }
        });

        // Always keep at least one textarea
        if (group.querySelectorAll("textarea").length === 0) {
            addTextarea(groupId, placeholder);
        }

        renumberGroup(groupId);
    }

    // ── Renumber the labels after any change ──────────────────────────────────
    function renumberGroup(groupId) {
        const group    = document.getElementById(groupId);
        const wrappers = group.querySelectorAll(".dynamic-wrapper");
        wrappers.forEach((wrapper, i) => {
            wrapper.querySelector(".dynamic-number").textContent = (i + 1) + ".";
        });
    }

    // ── Collect values from a group as "1. x 2. y 3. z" ─────────────────────
    function collectGroup(groupId) {
        const group     = document.getElementById(groupId);
        const textareas = group.querySelectorAll("textarea");
        const values    = [];

        textareas.forEach((ta, i) => {
            const val = ta.value.trim();
            if (val !== "") {
                values.push((i + 1) + ". " + val);
            }
        });

        return values.join("  ");
    }

    // ── Submit the form ───────────────────────────────────────────────────────
    function submitForm() {
        const webAppUrl = localStorage.getItem("glosarray_url");

        if (!webAppUrl) {
            alert("Primero pega el URL del Web App en la página de Inicio.");
            return;
        }

        const palabra = document.querySelector("textarea[name='palabra']").value.trim();
        if (!palabra) {
            alert("La palabra no puede estar vacía.");
            return;
        }

        const payload = {
            action:            "agregar",
            palabra:           palabra,
            etimologia:        document.querySelector("textarea[name='etimologia']").value.trim(),
            funcionSintactica: document.querySelector("textarea[name='funcion_sintactica']").value.trim(),
            definicion:        collectGroup("group-definicion"),
            sinonimos:         collectGroup("group-sinonimos"),
            antonimos:         collectGroup("group-antonimos"),
            ejemplos:          collectGroup("group-ejemplos"),
            fuentes:           collectGroup("group-fuentes"),
        };

        const btn = document.getElementById("agregarform");
        btn.textContent = "Agregando...";
        btn.disabled    = true;

        fetch(webAppUrl, {
            method:  "POST",
            headers: { "Content-Type": "text/plain" },
            body:    JSON.stringify(payload),
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert("¡Palabra agregada exitosamente!");
                location.reload();
            } else {
                alert("Error: " + (data.error || "Algo salió mal."));
                btn.textContent = "Agregar";
                btn.disabled    = false;
            }
        })
        .catch(err => {
            alert("Error de conexión: " + err);
            btn.textContent = "Agregar";
            btn.disabled    = false;
        });
    }
</script>
</body>
</html>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    background-color: transparent;
}

main{
    display: block;
    width: 100%;
    min-height: 80vh;
    field-sizing: content;
    margin-bottom: 100px;
}

#body{
    margin: 0;
    padding: 0; 
    box-sizing: border-box; 
    background-image: linear-gradient(to bottom right, rgb(0, 64, 255), rgb(0, 255, 234), rgb(47, 255, 245)); 
    background-size: cover; 
    background-position: center; 
    background-repeat: no-repeat; 
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: minmax(0, 1fr);
}

.insectionname{
    color: rgb(0, 0, 0);
    font-size: 30px;
    font-family: "Orbitron", sans-serif;
    text-align: center;
    margin-bottom: 2px;
    margin-top: 20px;
}

.insert{
    font-size: 25px;
    width: 70%;
    display: block;
    margin-left: auto;
    margin-right: auto;
    resize: none;
    field-sizing: content;
    padding: 5px;
    transition: all 0.25s ease-in-out;
}

.insert:focus{
    font-size: 27px;
}

.word{
    font-size: 30px;
    width: 30%;
    display: block;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 20px;
    padding-left: 15px;
    resize: none;
    transition: all 0.25s ease-in-out;
    field-sizing: content;
}

.word:focus{
    font-size: 32px;
}

/* ── Dynamic group styles ───────────────────────────────────────── */
.dynamic-group {
    width: 100%;
}

.dynamic-wrapper {
    display: flex;
    align-items: flex-start;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
    margin-top: 8px;
    gap: 6px;
    animation: fadeInTA 0.25s ease-in-out;
}

.dynamic-ta {
    padding-top: 5px !important;
    padding-bottom: 5px !important;
}

@keyframes fadeInTA {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
}

.dynamic-number {
    font-family: "Orbitron", sans-serif;
    font-size: 22px;
    color: rgb(0, 0, 0);
    padding-top: 4px;
    min-width: 28px;
    text-align: right;
    flex-shrink: 0;
}

.dynamic-ta {
    width: 100% !important;
    margin: 0 !important;
}

/* ── Button ─────────────────────────────────────────────────────── */
#agregarform{
    margin-top: 35px;
    font-family: "Orbitron", sans-serif; 
    color: rgb(0, 0, 0); 
    field-sizing: content;
    text-align: center; 
    font-size: 38px; 
    padding: 15px 25px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    background-color: rgb(255, 255, 255); 
    text-decoration: none;
    transition: ease-in-out, 0.20s;
    border-radius: 3em;
    box-shadow: 0px 5px 0px rgb(203, 203, 203), 0px 10px 0px rgb(203, 203, 203), 0px 15px 0px rgb(203, 203, 203), 0px 20px 0px rgb(203, 203, 203);
    border-color: transparent;
    cursor: pointer;
}

#agregarform:hover{
    box-shadow: 0px 5px 0px rgb(203, 203, 203), 0px 10px 0px rgb(203, 203, 203), 0px 15px 0px rgb(203, 203, 203), 0px 20px 0px rgb(203, 203, 203), 0px 20px 30px rgba(18, 12, 12, 0.565);
}

#agregarform:active{
    background-color: rgb(0, 255, 0); 
    transform: translateY(7px);
    box-shadow: 0px 3px 0px rgb(72, 139, 40), 0px 6px 0px rgb(72, 139, 40), 0px 9px 0px rgb(72, 139, 40), 0px 12px 0px rgb(72, 139, 40), 0px 12px 60px rgba(93, 251, 75, 0.992);
}

#agregarform:disabled{
    opacity: 0.6;
    cursor: not-allowed;
}

.secname{
    color: rgb(255, 255, 255);
    font-size: 30px;
    font-family: "Orbitron", sans-serif;
    text-align: center;
    margin-bottom: 20px;
    margin-top: 20px;
    background-color: rgba(0, 0, 0, 0.294);
    box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.339);
    position: static;
}

.bodydiv{
    display: flex;
    width: 100%;
    min-height: 40vh;
    field-sizing: content;
}

.divleft{
    align-items: center;
    height: 60%;
    width: 50%;
    field-sizing: content;
}

.divright{
    align-items: center;
    height: 60%;
    width: 50%;
    field-sizing: content;
}
</style>
